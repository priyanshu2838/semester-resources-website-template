<!doctype html>
<html lang="en">

<head>
    <!-- Character Encoding -->
    <meta charset="UTF-8" />

    <!-- Makes website responsive on mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Flowbite Components -->
    <script src="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.js"></script>

    <!-- Website Title -->
    <title>Study Resource Hub</title>

    <!-- Custom Animations & Styles -->
    <style>
        @keyframes float {
            0% {
                transform: translate(0px, 0px) rotate(0deg);
            }

            33% {
                transform: translate(20px, -30px) rotate(5deg);
            }

            66% {
                transform: translate(-20px, 20px) rotate(-5deg);
            }

            100% {
                transform: translate(0px, 0px) rotate(0deg);
            }
        }

        .animate-float {
            animation: float 10s ease-in-out infinite;
        }

        .animation-delay-2000 {
            animation-delay: 2s;
        }

        .animation-delay-4000 {
            animation-delay: 4s;
        }

        /* Ruled paper background pattern */
        .bg-lines {
            background-color: #fafafa;
            background-image: linear-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 100% 2.5rem;
        }
    </style>
</head>

<!-- Body Starts Here -->

<body class="relative min-h-screen overflow-x-hidden text-slate-800 bg-slate-50">

    <!-- Educational Stationery Background (Dense & Smaller) -->
    <div class="fixed inset-0 z-[-1] overflow-hidden pointer-events-none bg-lines">
        <!-- Notebook Red Margin -->
        <div class="absolute top-0 bottom-0 left-12 md:left-24 w-0.5 bg-red-300 opacity-60"></div>

        <!-- Floating Pen 1 -->
        <div class="mouse-parallax absolute inset-0 transition-transform duration-300 ease-out" data-speed="1.5">

                    <path stroke-linecap="round" stroke-linejoin="round"

                </svg>
            </div>

            </div>

        <!-- Floating Book 1 -->

            <div class="absolute bottom-[20%] left-[20%] text-teal-300 opacity-60 animate-float animation-delay-4000">
                <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"

                    <path stroke-linecap="round" stroke-linejoin="round"

            <div class="absolute bottom-[10%] right-[10%] text-indigo-300 opacity-60 animate-float">
                <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"
                    class="w-24 h-24 transform -rotate-12">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M4.26 10.147a60.436 60.436 0 00-.491 6.347A48.627 48.627 0 0112 20.904a48.627 48.627 0 018.232-4.41 60.46 60.46 0 00-.491-6.347m-15.482 0a50.57 50.57 0 00-2.658-.813A59.905 59.905 0 0112 3.493a59.902 59.902 0 0110.399 5.84c-.896.248-1.783.52-2.658.814m-15.482 0A50.697 50.697 0 0112 13.489a50.702 50.702 0 017.74-3.342M6.75 15a.75.75 0 100-1.5.75.75 0 000 1.5zm0 0v-3.675A55.378 55.378 0 0112 8.443m-7.007 11.55A5.981 5.981 0 006.75 15.75v-1.5" />

            </div>
        </div>

        <!-- Floating Calculator -->
        <div class="mouse-parallax absolute inset-0 transition-transform duration-300 ease-out" data-speed="-0.8">
            <div class="absolute top-[50%] left-[5%] text-rose-300 opacity-60 animate-float animation-delay-4000">
                <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"
                    class="w-16 h-16 transform -rotate-6">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M15.75 15.75V18m-7.5-6.75h.008v.008H8.25v-.008zm0 2.25h.008v.008H8.25V13.5zm0 2.25h.008v.008H8.25v-.008zm3.375-4.5h.008v.008h-.008v-.008zm0 2.25h.008v.008h-.008V13.5zm0 2.25h.008v.008h-.008v-.008zm3.375-4.5h.008v.008h-.008v-.008zm0 2.25h.008v.008h-.008V13.5zM4.5 10.5h15M4.5 19.5h15a2.25 2.25 0 002.25-2.25V6.75A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25v10.5A2.25 2.25 0 004.5 19.5z" />
                </svg>
            </div>
        </div>

        <!-- Floating Chart -->
        <div class="mouse-parallax absolute inset-0 transition-transform duration-300 ease-out" data-speed="1.1">
            <div class="absolute top-[8%] right-[40%] text-blue-300 opacity-60 animate-float animation-delay-2000">
                <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"
                    class="w-20 h-20 transform rotate-6">
                    <path stroke-linecap="round" stroke-linejoin="round"

                </svg>
            </div>
        </div>
    </div>

    ========================== -->

            <!-- Top Row -->

        <h1
            class="text-6xl font-extrabold mb-6 tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-emerald-700 to-teal-600 max-w-5xl mx-auto">

        <p class="text-xl text-slate-600 mb-10 max-w-2xl mx-auto">

        <button onclick="window.location.href='explore resources.html'"
